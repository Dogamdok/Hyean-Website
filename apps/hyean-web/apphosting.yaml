# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: HYEAN_INQUIRY_EMAIL_ENABLED
    value: "true"
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_EMAIL_SUBJECT_PREFIX
    value: "[혜안 웹사이트 문의]"
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_SMTP_HOST
    value: "smtp.gmail.com"
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_SMTP_PORT
    value: "465"
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_SMTP_SECURE
    value: "true"
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_EMAIL_USER
    secret: HYEAN_INQUIRY_EMAIL_USER
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_EMAIL_PASS
    secret: HYEAN_INQUIRY_EMAIL_PASS
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_EMAIL_TO
    secret: HYEAN_INQUIRY_EMAIL_TO
    availability:
      - RUNTIME
  - variable: HYEAN_INQUIRY_EMAIL_FROM
    secret: HYEAN_INQUIRY_EMAIL_FROM
    availability:
      - RUNTIME
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
